<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>在线用户 - SLS Log Inspector</title>
    <!-- fonts loaded locally -->
    <link rel="stylesheet" href="./assets/fonts/local-fonts.css" />
    <script>
      window.tailwind = {
        config: {
          theme: {
            extend: {
              colors: {
                ink: "var(--ink)",
                muted: "var(--muted)",
                panel: "var(--panel)",
                soft: "var(--panel-soft)",
                line: "var(--line)",
                brand: "var(--blue)",
              },
              fontFamily: {
                sans: ["Inter", "Segoe UI", "Microsoft YaHei UI", "system-ui", "sans-serif"],
                mono: ["JetBrains Mono", "Cascadia Mono", "Consolas", "SFMono-Regular", "monospace"],
              },
              boxShadow: {
                panel: "var(--shadow)",
              },
            },
          },
        },
      };
    </script>
    <script src="./assets/tailwind.js"></script>
    <link rel="stylesheet" href="./styles.css?v=20260609tw2" />
    <style>
      .online-page {
        max-width: 960px;
        margin: 24px auto;
        padding: 0 16px 40px;
        display: grid;
        gap: 14px;
      }

      .online-page-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
      }

      .online-page-head h1 {
        margin: 0;
        font-size: 22px;
        letter-spacing: -0.02em;
      }

      .online-count-badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 7px 12px;
        border-radius: 999px;
        background: linear-gradient(180deg, var(--blue-soft), color-mix(in srgb, var(--blue-soft) 70%, var(--panel)));
        color: var(--blue);
        font-weight: 700;
        box-shadow: 0 0 0 1px color-mix(in srgb, var(--blue) 18%, transparent) inset;
      }

      .online-table-wrap {
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: color-mix(in srgb, var(--panel) 92%, transparent);
        box-shadow: var(--shadow);
        overflow: auto;
      }

      .online-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }

      .online-table th,
      .online-table td {
        padding: 10px 12px;
        border-bottom: 1px solid var(--line);
        text-align: left;
        vertical-align: top;
      }

      .online-table th {
        background: linear-gradient(180deg, var(--panel-soft), color-mix(in srgb, var(--panel-soft) 76%, var(--panel)));
        color: var(--muted);
        font-weight: 700;
        white-space: nowrap;
      }

      .online-table tr:last-child td {
        border-bottom: 0;
      }

      .online-table tbody tr {
        transition: background 0.14s ease;
      }

      .online-table tbody tr:hover {
        background: color-mix(in srgb, var(--blue-soft) 45%, transparent);
      }

      .online-meta {
        color: var(--muted);
        font-size: 12px;
      }

      .online-empty {
        padding: 36px;
        text-align: center;
        color: var(--muted);
      }
    </style>
  </head>
  <body class="bg-[var(--bg)] text-ink antialiased">
    <div class="online-page">
      <div class="online-page-head rounded-md border border-line/80 bg-panel/90 p-4 shadow-panel">
        <div>
          <h1>当前在线用户</h1>
          <p class="online-meta">超过 90 秒未心跳的会话会自动下线 · 每 5 秒刷新</p>
        </div>
        <div style="display: flex; gap: 8px; align-items: center">
          <span class="online-count-badge">在线 <b id="onlineCount">0</b> 人</span>
          <a href="/"><button type="button">返回工作台</button></a>
        </div>
      </div>

      <div class="online-table-wrap shadow-panel">
        <table class="online-table">
          <thead>
            <tr>
              <th>标识</th>
              <th>IP</th>
              <th>当前页面</th>
              <th>最近活跃</th>
              <th>首次上线</th>
            </tr>
          </thead>
          <tbody id="onlineTableBody">
            <tr>
              <td colspan="5" class="online-empty">加载中...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <script>
      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function formatTime(ts) {
        if (!ts) return "-";
        const date = new Date(Number(ts) * 1000);
        if (Number.isNaN(date.getTime())) return "-";
        return date.toLocaleString();
      }

      async function refreshPresence() {
        const countEl = document.querySelector("#onlineCount");
        const bodyEl = document.querySelector("#onlineTableBody");
        try {
          const response = await fetch("/api/presence");
          const data = await response.json();
          if (!response.ok || data.ok === false) {
            throw new Error(data.message || `HTTP ${response.status}`);
          }
          const users = Array.isArray(data.users) ? data.users : [];
          countEl.textContent = String(data.count ?? users.length);
          if (!users.length) {
            bodyEl.innerHTML = '<tr><td colspan="5" class="online-empty">当前没有在线用户</td></tr>';
            return;
          }
          bodyEl.innerHTML = users
            .map(
              (user) => `
                <tr>
                  <td>${escapeHtml(user.label || user.id || "-")}</td>
                  <td>${escapeHtml(user.ip || "-")}</td>
                  <td>${escapeHtml(user.page || "/")}</td>
                  <td>${escapeHtml(formatTime(user.last_seen))}</td>
                  <td>${escapeHtml(formatTime(user.first_seen))}</td>
                </tr>
              `
            )
            .join("");
        } catch (error) {
          countEl.textContent = "?";
          bodyEl.innerHTML = `<tr><td colspan="5" class="online-empty">加载失败：${escapeHtml(error.message)}</td></tr>`;
        }
      }

      refreshPresence();
      setInterval(refreshPresence, 5000);
    </script>
  </body>
</html>
